// STORY
const S = COPY.story;
document.getElementById('about').innerHTML =
  `<div class="story-grid">
     <div>
       <div class="eyebrow">${S.eyebrow}</div>
       <div class="sage-line"></div>
       <h2>${hl(S.headline, S.accentLine)}</h2>
       ${S.body.map(b=>`<p class="body-p">${b}</p>`).join('')}
       <div class="s-quote">"${S.quote}"</div>
       <a href="${EU}" target="_blank" class="btn-p">${S.ctaLabel}</a>
     </div>
     <div class="s-aside">
       ${S.stats.map(s=>`<div class="sc"><div class="big">${s.num}</div><div class="lbl">${s.label}</div></div>`).join('')}
       <div class="press">${S.pressLabel}
         <div class="press-row">
           ${S.press.map((p,i)=>`<span>${p}</span>${i<S.press.length-1?'<span>·</span>':''}`).join('')}
         </div>
       </div>
     </div>
   </div>`;

// PROCESS
const PL = COPY.process;
document.getElementById('process').innerHTML =
  `<div class="eyebrow">${PL.eyebrow}</div>
   <div class="sage-line"></div>
   <h2>${hl(PL.headline, PL.accentLine)}</h2>
   <div class="steps">
     ${PL.steps.map(st=>`
       <div class="step">
         <div class="step-n">${st.num}</div>
         <h3>${st.title}</h3>
         <p>${st.body}</p>
       </div>`).join('')}
   </div>`;

// PRICING
const PC = COPY.pricing;
document.getElementById('coaching').innerHTML =
  `<div class="eyebrow">${PC.eyebrow}</div>
   <div class="sage-line"></div>
   <h2>${hl(PC.headline, PC.accentLine)}</h2>
   <p class="p-intro">${PC.intro}</p>
   <div class="plans">
     ${PC.plans.map(pl=>`
       <div class="plan">
         ${pl.badge ? `<div class="p-badge">${pl.badge}</div>` : ''}
         <div class="p-lvl">${pl.level}</div>
         <h3>${pl.name}</h3>
         <p class="p-desc">${pl.description}</p>
         <div class="p-price"><span class="amt">${pl.price}</span><span class="per">${pl.period}</span></div>
         <div class="p-div"></div>
         <ul class="p-feats">${pl.features.map(fi).join('')}</ul>
         <a href="${EU}" target="_blank" class="btn-p">${pl.ctaLabel}</a>
         ${pl.note ? `<div class="p-note">${pl.note}</div>` : ''}
       </div>`).join('')}
   </div>`;

// STAKES
const ST = COPY.stakes;
document.getElementById('stakes-wrap').innerHTML =
  `<div class="stakes">
     <div class="eyebrow">${ST.eyebrow}</div>
     <h2>${ST.headline}</h2>
     <p>${ST.body}</p>
     <a href="${EU}" target="_blank" class="btn-dk">${ST.ctaLabel}</a>
     <div class="stakes-sub">${ST.sub}</div>
   </div>`;

// FOOTER
const F = COPY.footer;
document.getElementById('foot').innerHTML =
  `<div class="f-inner">
     <div class="f-brand">
       <a href="#" class="logo">${COPY.brand}</a>
       <p>${F.tagline}</p>
     </div>
     <div class="f-col">
       <h4>Coaching</h4>
       ${F.coachingLinks.map(l=>`<a href="${l.href}"${extA(l.href)}>${l.label}</a>`).join('')}
     </div>
     <div class="f-col">
       <h4>Connect</h4>
       ${F.connectLinks.map(l=>`<a href="${l.href}"${extA(l.href)}>${l.label}</a>`).join('')}
     </div>
   </div>
   <div class="f-bottom">
     <span>${F.legal}</span>
     <div class="f-legal">
       ${F.legalLinks.map(l=>`<a href="${l.href}">${l.label}</a>`).join('')}
     </div>
   </div>`;
</script>
